modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
logoFile = "icon.png"
description='''
${mod_description}
'''

[[mixins]]
config="emf_compat_quark.mixins.json"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="quark"
type="required"
versionRange="[4.1-480,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="emf_compat_core"
type="required"
versionRange="[1.0.1,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="entity_model_features"
type="required"
versionRange="[3.2.4,)"
ordering="AFTER"
side="CLIENT"
