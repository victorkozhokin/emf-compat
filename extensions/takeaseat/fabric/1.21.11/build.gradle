plugins {
    id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
    id 'maven-publish'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

loom {
    splitEnvironmentSourceSets()

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }
}

repositories {
    mavenLocal()
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings "net.fabricmc:yarn:${yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"

    modImplementation project(':core-fabric-1.21.11')

    modCompileOnly 'maven.modrinth:ha1mEyJS:G6g51qwL' // Player Animation Library 1.1.7 for Fabric 1.21.11
    modCompileOnly 'maven.modrinth:Gg7qMzxE:dPeUBbtN' // Take a Seat 1.0.1 for Fabric 1.21.11
    modCompileOnly "maven.modrinth:entity-model-features:${emf_version}-fabric-${minecraft_version}"
    modCompileOnly "maven.modrinth:entitytexturefeatures:${etf_version}-fabric-${minecraft_version}"
}

processResources {
    inputs.property "version", version
    inputs.property "minecraft_version", minecraft_version
    inputs.property "loader_version", loader_version
    inputs.property "mod_id", mod_id
    inputs.property "mod_name", mod_name
    inputs.property "mod_description", mod_description
    inputs.property "mod_authors", mod_authors
    inputs.property "mod_license", mod_license
    inputs.property "emf_version", emf_version
    inputs.property "etf_version", etf_version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand([
                "version"          : version,
                "minecraft_version": minecraft_version,
                "loader_version"   : loader_version,
                "mod_id"           : mod_id,
                "mod_name"         : mod_name,
                "mod_description"  : mod_description,
                "mod_authors"      : mod_authors,
                "mod_license"      : mod_license,
                "emf_version"      : emf_version,
                "etf_version"      : etf_version
        ])
    }
}

def targetJavaVersion = project.hasProperty('target_java_version') ? target_java_version.toInteger() : 21
tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release.set(targetJavaVersion)
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
    withSourcesJar()
}

jar {
    from sourceSets.client.output
}

publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifactId = mod_id
            from components.java
        }
    }
}
